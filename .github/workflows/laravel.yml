name: Laravel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout package
        uses: actions/checkout@v4
        with:
          path: package

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Create Laravel app
        run: composer create-project laravel/laravel testbench --no-interaction

      - name: Require package (path repository)
        working-directory: testbench
        run: |
          composer config repositories.escalated path ../package
          composer require escalated-dev/escalated-laravel:@dev --no-interaction

      - name: Prepare environment
        working-directory: testbench
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations (if needed)
        working-directory: testbench
        run: php artisan migrate --no-interaction --force

      - name: Run tests
        working-directory: testbench
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test
